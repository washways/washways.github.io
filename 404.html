<!-- smart404-managed-by:washways-manager:v2 -->
<style>
    :root {
        color-scheme: light;
    }
    body {
        margin: 0;
        background:
            radial-gradient(circle at 10% 20%, rgba(232, 80, 91, 0.12), transparent 45%),
            radial-gradient(circle at 90% 15%, rgba(154, 196, 248, 0.18), transparent 45%),
            #f8fafc;
        color: #0f172a;
        font-family: "Inter", "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }
    .smart404-shell {
        min-height: 72vh;
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
    }
    .smart404-card {
        width: min(680px, 94vw);
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
        padding: 2rem;
        text-align: center;
    }
    .smart404-kicker {
        margin: 0 0 0.5rem;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #64748b;
    }
    .smart404-title {
        margin: 0 0 0.6rem;
        font-size: clamp(1.7rem, 3vw, 2.4rem);
        line-height: 1.15;
        color: #0b1220;
    }
    .smart404-mascot {
        font-size: 2.1rem;
        margin-bottom: 0.7rem;
        animation: smart404-pop-wiggle 1.1s ease-out 1;
        display: inline-block;
    }
    @keyframes smart404-pop-wiggle {
        0% { transform: translateY(8px) scale(0.8) rotate(0deg); opacity: 0; }
        30% { transform: translateY(0) scale(1.05) rotate(-8deg); opacity: 1; }
        60% { transform: scale(1.05) rotate(8deg); }
        100% { transform: scale(1) rotate(0deg); }
    }
    .smart404-message {
        margin: 0.6rem 0 1.2rem;
        color: #334155;
        font-size: 1rem;
        line-height: 1.6;
    }
    .smart404-actions {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 0.65rem;
        margin-top: 1rem;
    }
    .smart404-link {
        display: inline-block;
        text-decoration: none;
        color: #0f172a;
        border: 1px solid #cbd5e1;
        border-radius: 999px;
        padding: 0.55rem 0.9rem;
        font-weight: 600;
    }
    .smart404-search {
        margin-top: 1rem;
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        flex-wrap: wrap;
    }
    .smart404-search input {
        min-width: min(420px, 90%);
        border: 1px solid #cbd5e1;
        border-radius: 999px;
        padding: 0.6rem 0.85rem;
        font: inherit;
    }
    .smart404-search button {
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        color: #0f172a;
        border-radius: 999px;
        padding: 0.6rem 0.95rem;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
    }
    .smart404-hint {
        margin: 0.7rem 0 0;
        color: #64748b;
        font-size: 0.86rem;
    }
</style>

<div class="smart404-shell">
    <main class="smart404-card">
        <div class="smart404-mascot" aria-hidden="true">(o_O)</div>
        <p class="smart404-kicker">Washways</p>
        <h1 class="smart404-title">Page not found</h1>
        <p id="redirect-msg" class="smart404-message">Checking for typo-based redirects...</p>
        <form id="smart404-search" class="smart404-search">
            <input id="smart404-query" type="search" placeholder="Search the site or jump to an app name..." />
            <button type="submit">Search</button>
        </form>
        <p class="smart404-hint">No alias match? Try a quick site search.</p>
        <div class="smart404-actions">
            <a class="smart404-link" href="/">Go to Homepage</a>
        </div>
    </main>
</div>

<script>
(async function() {
    try {
        const messageEl = document.getElementById('redirect-msg');
        const queryInput = document.getElementById('smart404-query');
        const searchForm = document.getElementById('smart404-search');
        let aliases = null;
        let basePrefix = '';
        const escapeHtml = (value) => String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        const normalizeSeg = (value) => String(value || '')
            .toLowerCase()
            .replace(/^\/+|\/+$/g, '')
            .trim();
        const findTarget = (query, aliasMap) => {
            const q = normalizeSeg(query);
            if (!q || !aliasMap || typeof aliasMap !== 'object') return '';

            for (const [targetApp, typoList] of Object.entries(aliasMap)) {
                const targetSeg = normalizeSeg(targetApp);
                if (!targetSeg) continue;
                if (targetSeg === q) return targetSeg;
                if (Array.isArray(typoList) && typoList.map(normalizeSeg).includes(q)) {
                    return targetSeg;
                }
            }
            for (const [targetApp] of Object.entries(aliasMap)) {
                const targetSeg = normalizeSeg(targetApp);
                if (targetSeg && targetSeg.includes(q)) return targetSeg;
            }
            return '';
        };
        const setMessage = (message, allowHtml) => {
            if (!messageEl) return;
            if (allowHtml) {
                messageEl.innerHTML = message;
            } else {
                messageEl.textContent = message;
            }
        };
        const attachSearchHandler = () => {
            if (!searchForm || !queryInput) return;
            searchForm.addEventListener('submit', function(evt) {
                evt.preventDefault();
                const q = queryInput.value || '';
                if (!q.trim()) return;

                const matchedTarget = findTarget(q, aliases);
                if (matchedTarget) {
                    window.location.assign(basePrefix + '/' + matchedTarget + '/');
                    return;
                }

                const host = window.location.hostname || 'washways.org';
                const searchUrl = 'https://www.google.com/search?q=' + encodeURIComponent('site:' + host + ' ' + q);
                window.location.assign(searchUrl);
            });
        };
        attachSearchHandler();

        const currentPath = window.location.pathname.toLowerCase().replace(/\/+$/, '');
        const pathSegs = currentPath.split('/').filter(Boolean);
        const lastSeg = normalizeSeg(pathSegs[pathSegs.length - 1]);

        if (!lastSeg) {
            setMessage('The requested page could not be found. Check the URL or return to the homepage.');
            return;
        }

        // Support both root pages (/aliases.json) and project pages (/<repo>/aliases.json).
        const aliasCandidates = ['/aliases.json'];
        if (pathSegs.length > 1) {
            aliasCandidates.push('/' + pathSegs[0] + '/aliases.json');
        }

        for (const candidate of aliasCandidates) {
            try {
                const res = await fetch(candidate, { cache: 'no-store' });
                if (!res.ok) continue;
                aliases = await res.json();
                basePrefix = candidate === '/aliases.json'
                    ? ''
                    : candidate.replace(/\/aliases\.json$/, '');
                break;
            } catch (fetchErr) {
                // Try next path candidate.
            }
        }

        if (!aliases || typeof aliases !== 'object') {
            setMessage('The requested page could not be found. Check the URL or return to the homepage.');
            return;
        }

        // Find match
        for (const [targetApp, typoList] of Object.entries(aliases)) {
            if (!Array.isArray(typoList)) continue;
            const normalizedTypos = typoList.map(t => normalizeSeg(t));
            if (normalizedTypos.includes(lastSeg)) {
                const targetSeg = String(targetApp || '').replace(/^\/+|\/+$/g, '');
                if (!targetSeg) continue;
                setMessage("Did you mean <strong>/" + escapeHtml(targetSeg) + "/</strong>? Redirecting...", true);
                setTimeout(() => {
                    window.location.replace(basePrefix + '/' + targetSeg + '/');
                }, 1000);
                return;
            }
        }

        setMessage('No matching alias was found. Check the URL or return to the homepage.');
    } catch(e) {
        console.error("Smart 404 Error", e);
        const messageEl = document.getElementById('redirect-msg');
        if (messageEl) {
            messageEl.textContent = 'The requested page could not be found.';
        }
    }
})();
</script>
